<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clubs - Campus Life</title>

    <!-- bootstrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- custom css -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>

    <!-- navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html"> Campus Life</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="dining.html">Dining</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="clubs.html">Clubs</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="events.html">Events</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- main content -->
    <main class="container my-5">

      <!-- Clubs heading -->
      <h1 class="text-center mb-2"> Clubs & Organizations</h1>
      <p class="text-center lead mb-4">Find your community at Millsaps College</p>

      <!-- clicking these buttons shows only clubs in that category -->
      <div class="text-center mb-4">
        <button class="btn btn-outline-primary mx-1 mb-2" onclick="filterClubs('all')">All</button>
        <button class="btn btn-outline-primary mx-1 mb-2" onclick="filterClubs('academic')">Academic</button>
        <button class="btn btn-outline-primary mx-1 mb-2" onclick="filterClubs('culture')">Culture</button>
        <button class="btn btn-outline-primary mx-1 mb-2" onclick="filterClubs('greek')">Greek Life</button>
        <button class="btn btn-outline-primary mx-1 mb-2" onclick="filterClubs('religious')">Religious</button>
        <button class="btn btn-outline-primary mx-1 mb-2" onclick="filterClubs('special')">Special Interest</button>
      </div>

      <!-- club cards will show up here when a filter button is clicked -->
      <div id="clubs-container" class="row g-3"></div>

    </main>

    <!-- footer -->
    <footer class="text-center py-3 bg-dark text-white mt-5">
      <p class="mb-0">&copy; 2026 Campus Life Super App</p>
    </footer>

    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- custom js -->
    <script src="js/main.js"></script>

  </body>
</html>
