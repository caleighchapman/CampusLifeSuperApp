      <div class="container">
        <a class="nav-link active" href="dining.html" aria-current="page">Dining</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

      <h1 class="text-center mb-4"> Dining</h1>

      <!-- location buttons, so clicking these shows that location's info -->
      <div class="text-center mb-4">
        <p class="lead">Select a dining location:</p>
        <button class="btn btn-primary mx-2" onclick="showLocation('reubens')">Reubens</button>
        <button class="btn btn-primary mx-2" onclick="showLocation('caf')">The Caf</button>
        <button class="btn btn-primary mx-2" onclick="showLocation('ecogrounds')">Ecogrounds</button>
      </div>

      <!-- blank until button is clicked -->
      <div id="location-info" class="mt-4"></div>
